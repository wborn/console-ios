name: Test

on:
  # Push on main and release tags
  push:
    branches:
      - 'main'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

  # PR
  pull_request:
    branches:
      - 'main'

  # Manual trigger
  workflow_dispatch:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:

      - name: Test
        run: |
          echo "EVENT_NAME: ${EVENT_NAME}"
          echo "REF_NAME: ${REF_NAME}"
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
